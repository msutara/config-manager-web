name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v19

  lint:
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: "github.com/msutara/*"
      GONOSUMCHECK: "github.com/msutara/*"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Configure private modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/msutara/".insteadOf "https://github.com/msutara/"
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8

  test:
    runs-on: ubuntu-latest
    env:
      GOPRIVATE: "github.com/msutara/*"
      GONOSUMCHECK: "github.com/msutara/*"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
      - name: Configure private modules
        run: |
          git config --global url."https://x-access-token:${{ secrets.GH_PAT }}@github.com/msutara/".insteadOf "https://github.com/msutara/"
      - name: Run tests
        run: go test ./...
