{{ define "page" }}
{{ template "layout" . }}
{{ end }}

{{ define "content" }}
<h2>Network</h2>

<div id="page-data" hx-get="/fragments/network" hx-trigger="load" hx-swap="innerHTML" hx-request='{"timeout":15000}'>
    <div class="card-grid">
        <div class="card"><h3>Connectivity</h3><div class="skeleton skeleton-text"></div></div>
        <div class="card"><h3>DNS</h3><div class="skeleton skeleton-text"></div></div>
    </div>

    <h3>Interfaces</h3>
    <table class="data-table">
        <thead>
            <tr><th>Name</th><th>MAC</th><th>State</th><th>IP</th></tr>
        </thead>
        <tbody>
            <tr><td><div class="skeleton skeleton-text"></div></td><td><div class="skeleton skeleton-text"></div></td><td><div class="skeleton skeleton-text"></div></td><td><div class="skeleton skeleton-text"></div></td></tr>
            <tr><td><div class="skeleton skeleton-text"></div></td><td><div class="skeleton skeleton-text"></div></td><td><div class="skeleton skeleton-text"></div></td><td><div class="skeleton skeleton-text"></div></td></tr>
            <tr><td><div class="skeleton skeleton-text"></div></td><td><div class="skeleton skeleton-text"></div></td><td><div class="skeleton skeleton-text"></div></td><td><div class="skeleton skeleton-text"></div></td></tr>
        </tbody>
    </table>
</div>
{{ end }}
