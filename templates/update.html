{{ define "page" }}
{{ template "layout" . }}
{{ end }}

{{ define "content" }}
<h2>Update Manager</h2>

<div id="page-data" hx-get="/fragments/update" hx-trigger="load" hx-swap="innerHTML" hx-request='{"timeout":15000}'>
    <div class="card-grid">
        <div class="card"><h3>Pending Updates</h3><div class="skeleton skeleton-text"></div></div>
        <div class="card"><h3>Security Updates</h3><div class="skeleton skeleton-text"></div></div>
    </div>

    <h3>Packages</h3>
    <table class="data-table">
        <thead>
            <tr><th>Package</th><th>Current</th><th>New</th><th>Security</th></tr>
        </thead>
        <tbody>
            <tr><td><div class="skeleton skeleton-text"></div></td><td><div class="skeleton skeleton-text"></div></td><td><div class="skeleton skeleton-text"></div></td><td><div class="skeleton skeleton-text"></div></td></tr>
            <tr><td><div class="skeleton skeleton-text"></div></td><td><div class="skeleton skeleton-text"></div></td><td><div class="skeleton skeleton-text"></div></td><td><div class="skeleton skeleton-text"></div></td></tr>
            <tr><td><div class="skeleton skeleton-text"></div></td><td><div class="skeleton skeleton-text"></div></td><td><div class="skeleton skeleton-text"></div></td><td><div class="skeleton skeleton-text"></div></td></tr>
        </tbody>
    </table>

    <h3>Actions</h3>
    <div class="actions">
        <div class="skeleton skeleton-text" style="width:140px;height:2.2rem;display:inline-block"></div>
    </div>
</div>
{{ end }}
