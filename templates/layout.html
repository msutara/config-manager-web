{{ define "layout" }}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Config Manager{{ if .Page }} - {{ .Page }}{{ end }}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/htmx.min.js"></script>
</head>
<body>
    <nav class="sidebar">
        <div class="sidebar-header">
            <h1>CM</h1>
            <span class="version">Config Manager</span>
        </div>
        <ul class="nav-links">
            <li><a href="/" class="{{ if eq .Page "dashboard" }}active{{ end }}">Dashboard</a></li>
            <li><a href="/update" class="{{ if eq .Page "update" }}active{{ end }}">Update</a></li>
            <li><a href="/network" class="{{ if eq .Page "network" }}active{{ end }}">Network</a></li>
            {{ range .Plugins }}{{ if and (ne .Name "update") (ne .Name "network") }}
            <li><a href="/{{ .Name }}" class="{{ if eq $.Page .Name }}active{{ end }}">{{ .Name | title }}</a></li>
            {{ end }}{{ end }}
        </ul>
        <div class="sidebar-footer">
            <form method="post" action="/auth/logout">
                <button type="submit" class="btn btn-sm">Logout</button>
            </form>
        </div>
    </nav>
    <main class="content">
        {{ template "content" . }}
    </main>
</body>
</html>
{{ end }}
