{{ if .NodeErr }}
<div class="alert alert-error">Failed to load system info: {{ .NodeErr | sanitize }} <button class="btn btn-sm" onclick="htmx.trigger(document.getElementById('page-data'),'retry')">Retry</button></div>
{{ else }}
<div class="card-grid">
    <div class="card">
        <h3>Hostname</h3>
        <p class="value">{{ .Node.Hostname }}</p>
    </div>
    <div class="card">
        <h3>Operating System</h3>
        <p class="value">{{ .Node.OS }}</p>
    </div>
    <div class="card">
        <h3>Kernel</h3>
        <p class="value">{{ .Node.Kernel }}</p>
    </div>
    <div class="card">
        <h3>Architecture</h3>
        <p class="value">{{ .Node.Arch }}</p>
    </div>
    <div class="card" hx-get="/fragments/dashboard" hx-trigger="every 30s" hx-select=".uptime-value" hx-target=".uptime-value" hx-swap="outerHTML" hx-request='{"timeout":15000}'>
        <h3>Uptime</h3>
        <p class="value uptime-value">{{ formatUptime .Node.UptimeSeconds }}</p>
    </div>
</div>
{{ end }}
